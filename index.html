*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--brand:#003d91;--brand2:#019ab3;--gold:#c79a00;--bg:#f5f8fa;--card:#fff;--ink:#1a2733;--mut:#6b7785;--line:#e2e8ee}
body{font-family:-apple-system,"PingFang TC",sans-serif;background:var(--bg);color:var(--ink);max-width:600px;margin:0 auto;padding-bottom:50px;}
.top{position:sticky;top:0;z-index:20;background:linear-gradient(135deg,#003d91,#019ab3);color:#fff;padding:18px 18px 14px;}
.top h1{font-size:1.35rem;font-weight:800;letter-spacing:1px;display:flex;align-items:center;gap:8px;}
.top .sub{font-size:12px;opacity:.85;margin-top:3px;}
.search{width:100%;font-size:15px;padding:11px 14px;border:none;border-radius:12px;margin-top:12px;background:rgba(255,255,255,.96);color:var(--ink);}
.wrap{padding:14px;}
.mhdr{font-size:12px;font-weight:800;color:var(--gold);letter-spacing:1px;margin:14px 4px 8px;}
.note{background:var(--card);border-radius:14px;padding:15px 16px;margin-bottom:10px;box-shadow:0 1px 6px rgba(0,61,145,.07);border-left:4px solid var(--brand2);cursor:pointer;}
.note .trow{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.note .t{font-size:15.5px;font-weight:700;line-height:1.35;}
.note .dchip{font-size:11px;font-weight:700;background:#e5f2f5;color:var(--brand);border-radius:6px;padding:2px 7px;white-space:nowrap;flex-shrink:0;margin-top:1px;}
.note .p{font-size:12.5px;color:var(--mut);margin-top:7px;line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.empty{text-align:center;color:var(--mut);font-size:13px;padding:30px;}
.foot{text-align:center;font-size:11px;color:#a8a29e;padding:20px;}
/* reader */
.reader{position:fixed;inset:0;background:var(--bg);z-index:50;overflow-y:auto;display:none;max-width:600px;margin:0 auto;}
.reader.show{display:block;}
.rbar{position:sticky;top:0;background:rgba(245,248,250,.95);backdrop-filter:blur(8px);padding:12px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;}
.rbar button{font-size:15px;font-weight:700;color:var(--brand2);background:none;border:none;display:flex;align-items:center;gap:4px;}
.rbar .rt{font-size:13px;font-weight:700;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.rbody{padding:18px 18px 60px;line-height:1.75;font-size:15.5px;}
.rbody h1{font-size:1.4rem;margin:18px 0 10px;color:var(--brand);}
.rbody h2{font-size:1.18rem;margin:20px 0 8px;color:var(--brand);border-bottom:2px solid var(--line);padding-bottom:4px;}
.rbody h3{font-size:1.05rem;margin:16px 0 6px;color:var(--ink);}
.rbody p{margin:10px 0;} .rbody ul,.rbody ol{margin:10px 0 10px 22px;} .rbody li{margin:5px 0;}
.rbody code{background:#eef4fb;padding:1px 5px;border-radius:5px;font-size:13px;}
.rbody pre{background:#1a2733;color:#e5f2f5;padding:14px;border-radius:10px;overflow-x:auto;font-size:13px;margin:12px 0;}
.rbody pre code{background:none;padding:0;color:inherit;}
.rbody table{width:100%;border-collapse:collapse;font-size:13.5px;margin:12px 0;display:block;overflow-x:auto;}
.rbody th,.rbody td{border:1px solid var(--line);padding:7px 10px;text-align:left;}
.rbody th{background:#eef4fb;color:var(--brand);}
.rbody blockquote{border-left:4px solid var(--brand2);background:transparent;margin:12px 0;padding:8px 14px;color:var(--mut);border-radius:0;}
.rbody a{color:var(--brand2);}
/* note widget */
.nfab{position:fixed;bottom:22px;right:16px;z-index:60;background:var(--gold);color:#fff;border:none;border-radius:24px;padding:10px 18px;font-size:13.5px;font-weight:700;cursor:pointer;box-shadow:0 3px 12px rgba(0,0,0,.25);letter-spacing:.5px;}
.npanel{position:fixed;bottom:0;left:0;right:0;max-width:600px;margin:0 auto;z-index:70;background:#fff;border-radius:20px 20px 0 0;box-shadow:0 -4px 24px rgba(0,61,145,.18);padding:18px 16px 36px;max-height:78vh;overflow-y:auto;transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);}
.npanel.open{transform:translateY(0);}
.nhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;}
.nhdr h3{font-size:15px;font-weight:800;color:var(--brand);}
.nhdr button{background:none;border:none;font-size:20px;cursor:pointer;color:var(--mut);padding:0 2px;}
.nsub{font-size:11.5px;color:var(--mut);margin-bottom:12px;}
.nrow{display:flex;gap:6px;margin-bottom:8px;align-items:center;min-width:0;}
.nrow select{font-size:13px;padding:8px 10px;border:1.5px solid var(--line);border-radius:10px;background:#f5f8fa;color:var(--ink);flex-shrink:0;max-width:40%;}
.nrow input{flex:1 1 120px;min-width:0;font-size:13px;padding:8px 10px;border:1.5px solid var(--line);border-radius:10px;background:#f5f8fa;color:var(--ink);}
.nrow input:focus,.nrow select:focus{outline:none;border-color:var(--brand2);}
.nbtns{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px;}
.nbtn{font-size:13px;padding:8px 0;border:none;border-radius:10px;cursor:pointer;font-weight:700;white-space:nowrap;text-align:center;}
.nbtn.add{background:var(--brand);color:#fff;}
.nbtn.exp{background:#e5f2f5;color:var(--brand);}
.nbtn.clr{background:#fee2e2;color:#b91c1c;}
.nitems{display:flex;flex-direction:column;}
.nitem{border-bottom:1px solid var(--line);padding:10px 12px;display:flex;align-items:flex-start;gap:8px;}
.nitem:last-child{border-bottom:none;}
.nitem .ntag{font-size:11px;background:var(--brand2);color:#fff;border-radius:6px;padding:2px 7px;white-space:nowrap;flex-shrink:0;margin-top:2px;}
.nitem .ntxt{flex:1;font-size:13.5px;line-height:1.5;color:var(--ink);word-break:break-all;}
.nitem .nts{font-size:10.5px;color:var(--mut);margin-top:3px;}
.nitem .ndel{background:none;border:none;cursor:pointer;color:#c4a0a0;font-size:16px;flex-shrink:0;display:flex;align-items:center;}
.nempty{text-align:center;color:var(--mut);font-size:13px;padding:24px;}
button svg{vertical-align:-.12em;}
.rbar button,.nfab,.nhdr button,.nbtn{display:inline-flex;align-items:center;justify-content:center;gap:5px;}
@media (max-width:480px){
  .wrap{padding:10px;}
  .note{padding:13px 14px;}
  .rbody{padding:14px 14px 60px;}
  .npanel{padding:16px 12px 32px;}
  .nrow{flex-direction:column;align-items:stretch;}
  .nrow select{max-width:none;width:100%;}
  .nrow input{width:100%;}
}
</style>

const NOTES = [{"title": "AI路上", "date": "2026/06/24", "ym": "202606", "preview": "繼續在 AI 路上努力 — Keep going on the AI journey", "md": "# 繼續在 AI 路上努力 — Keep going on the AI journey\n\n賺錢路上，持續精進 AI 能力。\nOn the road to earning, keep sharpening my AI skills.\n\n把 AI 變成每天工作的工具，一點一點累積，路會越走越寬。\nMake AI a daily working tool — build it up bit by bit, and the road keeps widening."}, {"title": "精準節稅", "date": "2026/05/12", "ym": "202605", "preview": "作者陳衍任", "md": "作者陳衍任\n\n## 節稅力1  慎選組織\n企業組織型態 獨資 合夥 公司 \n### 1. 發展風險\n獨資與合夥的設立，主要依據商業登記法。除小規模商業外，只需要向所在地主管機關申請登記即可，設立成本低，設立程序叫公司簡單。但商業名稱（商號 店 社 行）只適用於設立的直轄市或縣（市），不得跨區使用，且不得使用公司字樣。獨資或合夥的資本有限，發展上較為局限。\n公司的設立是依據公司法，公司必須依法設立完成登記之後，才可以以公司的名義營業。如有違反，甚至有刑事責任。\n\n在公司的名稱保護方面，可適用於全國，不限於設立的直轄市或縣市。此外，若有引進外部投資人的需求，且應對企業不同發展階段做彈性的安排，可考慮設立股份有限公司。\n2. 法律風險\n\n獨資是資本主一人出資經營，不論有賺有賠，全歸資本主一人。合夥則是兩個人以上的合夥人，互約出資以經營共同事業所成立的組織。\n\n兩者在法律上的性質基本相同，但由於獨資或合夥並不具備獨立的法人資格，因此資本主或合夥人對其事業所產生的債務，必須負完全清償債務的無限責任。\n\n相較之下，除了無限公司或兩合公司的無限責任股東外，公司與出資人的股東是不同的法律個體，各股東對於公司的責任以出資額為限，負有限責任。\n3. 稅務風險\n在所得稅的課徵上，公司應申報營利事業所得稅，稅率為 20%。其稅後盈餘分配給股東後，股東可以選擇兩種計稅方式：\n\n4. 將股利按所得 28% 分開計稅。\n5. 將股利所得計入綜合所得稅，並按股利金額的 8.5% 計算可抵減稅額（每戶以申報 8 萬元為限）。公司也可以選擇當年度不分配盈餘，如此股東可以遞延繳稅，但公司應就未分配盈餘加徵 5% 的營利事業所得稅。然而，公司如以該盈餘新建或購買供自行生產或營業用的建築物、軟硬體設備或技術，且支出合計達 100 萬以上，在當年度盈餘發生之次年度起三年內，於計算當年度未分配盈餘時，該實質投資的金額可列為減除項目，即可免徵 5% 的營利事業所得稅。\n\n這項規定是依據《產業創新條例》第 23 條之 3。至於獨資或合夥因營業產生的盈餘，會直接計入出資者或合夥人的綜合所得稅，因而無法延期繳稅。兩者相較之下，獨資或合夥的整體稅負看似較公司有利，但由於公司還可使用盈虧互抵（所得稅法第 39 條），能減少公司未來可分配給股東的盈餘。此外，現行的租稅優惠制度原則上多適用於公司組織，例如：\n1. 研究發展支出適用投資抵減\n2. 產業創新條例\n3. 中小企業發展條例\n4. 生物醫藥產業發展條例第五條最後在借款利息的認定上，獨資事業向資本主或合夥組織向合夥人所借貸款項，均應以「資本主往來」論，不得列支利息（所得稅法施行細則第 34 條）。\n\n相較之下，公司向股東借款所支付的利息，在不超過財政部規定的利率標準內，即可准予核實認列。在融資的管道上，公司組織顯然更為便利。\n\n自己的舞台最終還是要靠自己搭。待課的公司（公司組織）與不待課的獨資、合夥，其實沒有絕對的好壞，只有適不適合現階段的你。經營一間公司雖然有不低的維護成本，但它卻能在你最需要的時候，為你產出最高價值。\n\n參考資料：\n最高行政法院 111 年度上字第 820 號判決不論是有限公司、股份有限公司、有限合夥，或是以投資、合夥方式經營的事業，都必須在開始營業前，向主管機關辦理公司、商業或有限合夥登記。\n\n接著，由稅捐機關依據登記主管機關提供的資料，辦理稅籍登記，並申請合法統一編號及購買發票。甚至是營業人的總機構、固定營業場所、辦事處或分店等各個營業場所，只要有對外營業，都必須在開始營業前，分別向稅捐稽徵機關申請稅籍登記。\n\n因此，稅籍登記的範圍，實際上可能大於公司、商業或有限合夥的登記。無論是公司（股份有限公司）、有限合夥，或是以獨資、合夥方式經營的企業，都必須在營業前向主管機關辦理公司、商業或有限合夥登記。\n\n此外，也必須向稅捐稽徵機關，依據公司、商業或有限合夥登記主管機關提供的資料辦理稅籍登記，進而申請核發統一購票證並購買統一發票。甚至是營業人的工廠、機房、建築工程場所、辦事處、分店門市等固定營業場所，只要有對外營業，都必須在開始營業前分別向稅政機關申請稅籍登記。\n\n因此，稅籍登記的範圍實際上可能大於公司、商業或有限合夥登記的範圍。對於創業階段的中小企業主而言，由於收入還不夠穩定，為了節省成本，經常選擇以住家作為公司基地，甚至是稅籍登記地。\n\n當住家實際上供營業使用，只要 6 年內沒有轉售的計畫，稅務上會受影響的僅限於房屋稅與地價稅的調整。但稅務風險可以承受，並不代表自用住宅營業就是合法的選項。在建築管理與都市計畫法令的約束下，還是應先行檢視企業的主要營業項目，以確定營業項目是否符合規定。\n\n例如在營業場所內，供營業使用者應就地營業使用。如有不符土地使用分區管制規定時，就有被裁罰的風險。當以商務中心為稅籍登記地，則可能出現同一登記地址卻有大量使用發票的情形。\n\n此時，稅捐機關為了避免虛設行號等違章行為，可能管制營業人購買統一發票，或拒絕給予稅籍登記，故依舊存在著不確定的稅務風險。\n\n建議企業在事業剛起步時，應儘量避免這些不必要的稅務法律風險。關於營業人的認定，主要著重在其表現於外的經濟循環行為。凡是獨立且持續從事貨物或勞務銷售，不論其是否辦理稅籍登記，也不論其為法人、商號或自然人個人，皆屬營業稅法所稱的營業人，同時為營業稅的納稅義務人（加值型及非加值型營業稅法第 2 條第 1 款）。\n\n營業人若有以下情形，國稅局得依據查得資料核定其銷售額並補徵稅款：\n1. 未依規定向國稅局申請稅籍登記。\n2. 未依規定開立銷售憑證交付買受人。\n3. 未依規定申報銷售額。\n\n此外，為了維持租稅公平性，網路賣家的課稅標準必須比照實體商店。因此，網路賣家每個月在網路銷售貨物，若銷售額未達 8 萬元，暫時免向國稅局辦理稅籍登記；但仍應將進行網路交易的營利所得，併計個人年度綜合所得總額辦理結算申報。一旦網路賣家月銷售額貨物達到 8 萬元、勞務達到 4 萬元，就必須立刻向國稅局辦理稅籍登記。\n\n其後，若網路賣家每個月銷售額達到上述的營業稅起徵點，但未達 20 萬元時，則由國稅局按銷售額依稅率 1% 課徵。\n\n網路賣家如每個月銷售額超過 20 萬元，除依稅法規定免用統一發票者之外，即應使用統一發票，稅率為 5%。但相關進項稅額可提出扣抵，且必須每兩個月向國稅局申報銷售額，並繳納營業稅額。此外，自 112 年起，為了便利消費者辨識賣方營業人的相關資訊，營業人專營或兼營網路平臺、行動裝置應用程式或其他電子方式銷售貨物或勞務，其稅籍應登記。營業人專營或兼營網路平臺、App 或其他電子方式供他人銷售貨物或勞務，依規定負有保管或提示會員交易紀錄的協助義務，故應於收費憑證中載明會員交易紀錄及身份識別資料。\n\n至於實務上常見的開團代購，營業人如主張其為「代收轉付」，則代營業人收取與轉付之間必須沒有差額。其轉付額款項取得的憑證正面上，買受人名義應載明為「委託人」，因而得以該憑證交付委託人。\n\n若營業人被認為有「漏進漏銷」的違章行為，國稅局得以查得的營業人漏進金額，核定營業人漏報的銷售額，並據以補稅及處罰。有些人可能誤以為在網路上的銷售行為比較不容易被發現，殊不知相較於實體店面的銷售，網路上的銷售反而更容易留下軌跡。\n\n把公司開在雲端，不會讓你的稅務繳得比較少，反而會讓你受到更嚴格的監管，好日子比較少。有疑問的是，一般民眾該如何辨識國稅局在課稅時搬出的法條，到底是立法院制定的法律，或者是行政機關發布的行政命令？又此時的行政命令有無得到立法者的授權？\n\n這些問題在學理上還有進一步的討論空間。我知道對於創業的你而言，完美無缺的標準答案經常不是首選；只要有個八成的把握，你就得快槍跑前進。做出漸進政策決定的效率，反而能獲得你的青睞。"}, {"title": "AI影片連結", "date": "2026/04/27", "ym": "202604", "preview": "https://youtu.be/zUnWZMiOVBs?si=8uXlZcDjFjyCuBf_", "md": "https://youtu.be/zUnWZMiOVBs?si=8uXlZcDjFjyCuBf_"}, {"title": "選擇權", "date": "2026/04/17", "ym": "202604", "preview": "選擇權就是保險", "md": "### 選擇權就是保險\n- 選擇權可說是最具代表性的衍生性金融商品。\n- 選擇權是以股票利率匯率等金融資產為標的，例如股票選擇權，就是為了對抗未來股價下跌風險所簽訂。\n- 定義：只在某特定日期以特定價格買進或賣出特定數量股票或債券資產的權利\n- 選擇權的持有者是擁有權力的一方，而且重點是沒有義務\n- call option 未來特定日期 可以用事先約定價格買進金融資產的權利\n- put option 未來特定日期 可以用時先約定的價格賣出金融資產權利\n- 履約價格 選擇權契約中事先約定的標的資產買賣價格\n- 標的資產 在選擇權交易中作為標的的資產\n- 選擇權權利金  在選擇權購買時需支付的價格\n- 波動率 價格變動率 指標的資產的標準差\n- 歐式選擇權 買方到期日當天才能行使權利的選擇權\n- 美式選擇權 賣方在到期日前 隨時都可以自由行使權力的選擇權\n- 亞式選擇權 以到期日前標的資產平均價格作為履約價格的選擇權\n### 買權\n- 選擇權買方是擁有選擇權利的一方\n- 買權的價值C=Max(S-X,0) S股價 X履約價格\n- 賣方沒有選擇的權利\n- 買方賣方損益總和為0 零和遊戲\n### 賣權\n- 賣權的價值P=Max(X-S,0)\n### 選擇權特徵\n- 買權 履約價格>標的資產價格（股價）價外\n- 賣權 履約價格>標的資產價格 價內\n- 行使權利時 獲得利益的話 價內\n- 行使權利時 產生虧損的話 價外\n- 履約價格=標的資產價格 價平 ATM"}, {"title": "YouTube連結", "date": "2026/04/14", "ym": "202604", "preview": "https://youtube.com/watch?v=ORjvr09aMhk&si=dSVv4GL", "md": "https://youtube.com/watch?v=ORjvr09aMhk&si=dSVv4GLwvOBEeiha"}, {"title": "Claude工作分析", "date": "2026/04/14", "ym": "202604", "preview": "us claude to read work materials, like Business de", "md": "- us claude to read work materials, like Business development monthly and generate analysis report and dashboard, quite impressive on the report."}, {"title": "提示詞Skills", "date": "2026/04/12", "ym": "202604", "preview": "https://youtu.be/TiQOnrbVje0?si=_CpEm5ryM4IZFs66", "md": "https://youtu.be/TiQOnrbVje0?si=_CpEm5ryM4IZFs66 \n提示詞 skills \n\n📌 時間戳 [0:00](https://www.youtube.com/watch?v=TiQOnrbVje0) Prompt Engineering [1:14](https://www.youtube.com/watch?v=TiQOnrbVje0&t=74s) 為什麼 AI 產出不對 [3:12](https://www.youtube.com/watch?v=TiQOnrbVje0&t=192s) Anthropic 六大架構 [7:18](https://www.youtube.com/watch?v=TiQOnrbVje0&t=438s) 五個實戰技巧 🔗 thinkfirst 開源工具（影片中提到的 提示詞撰寫 skill） [https://github.com/garychen-ai/thinkf...](https://www.youtube.com/redirect?event=video_description&redir_token=QUFFLUhqbHFDZ05QQUFOd3FkRThQUWlxdkNWTVRHcnpVQXxBQ3Jtc0ttcGNMT2pqbGZZOVlXaGJHMlRvZ083akd1d3l4Wks5QmtGRW5yOXVKcEdmcGhjZ0FoLUp5RW8yOFBIMHp0d0N3TUt0a3NlM3BzYjF4eUt2RlFBZGlmczNWTGYzcVRZaHNTeGtvYTZGc3V5TVJCZHBMQQ&q=https%3A%2F%2Fg egal              | 上傳 PDF 合約→自動分析核心條款、風險、陷阱               | 律師費            |\n| Finance            | 從資料庫提取→對帳→財務報表生成→現金流分析→預測              | 財務軟體           |\n| Enterprise Search  | 跨 Slack/Email/Notion/Google Drive 統一搜索 | 企業搜索工具         |\n| Bio Research       | 從 PubMed 等權威學術資料庫搜索篩選                  | 學術搜索           |\n\n**操作步驟：使用 Plugins**\n\n1. 進入 Claude Desktop → 找到 Plugins 功能\n2. 安裝需要的 Plugin（內建已有，也可上傳自訂）\n3. 使用方式：在對話中輸入 `/`（slash）→ 選擇對應 Plugin 的 Skill\n4. 自訂 Skill：點擊 Plugin → Edit → 用 VS Code / Cursor 開啟編輯\n5. 連接外部工具（Connector）：安裝後登入帳號即可連接 Slack、Notion、HubSpot 等\n\n### 2.2 Claude Code Remote Control（手機遙控） `[0:16:48]`\n\n**操作步驟：**\n\n1. 打開 VS Code 的 Terminal\n2. 輸入指令：`claude remote-control`\n3. 系統會生成一個 QR Code 或網址\n4. 手機掃描 QR Code → 進入 Claude App 的遠端控制界面\n5. 手機端顯示 \"Interactive Session\" 即連接成功\n6. 在手機端輸入指令，電腦端會同步執行\n\n### 2.3 Claude Code 基本操作 `[0:20:00]`\n\n**操作步驟：安裝與設定**\n\n1. 安裝 Node.js（透過 nvm）\n2. 安裝 Claude Code：`npm install -g @anthropic-ai/claude-code`\n3. 在 Terminal 輸入 `claude` 進入互動模式\n4. 核心指令：\n   - `/help` — 查看所有指令\n   - `/model` — 切換模型\n   - `/cost` — 查看 token 消耗\n   - `/clear` — 清除對話歷史\n   - `/compact` — 壓縮對話節省 token\n\n### 2.4 CLAUDE.md 設定檔 `[0:25:00]`\n\n**操作步驟：**\n\n1. 在專案根目錄創建 `CLAUDE.md` 檔案\n2. 寫入專案規則、程式碼風格、技術棧等指引\n3. Claude Code 每次啟動時自動讀取此檔案\n4. 用途：確保 AI 按照你的規範工作\n\n### 2.5 MCP Server 連接 `[0:30:00]`\n\n**操作步驟：**\n\n1. 在 Claude Code 設定中加入 MCP Server\n2. 常用 MCP：Filesystem（讀寫檔案）、Playwright（瀏覽器自動化）、Firecrawl（網頁爬取）\n3. 設定方式：在 `settings.json` 或 `claude_desktop_config.json` 中配置\n4. 連接後 Claude Code 即可直接操作外部工具\n\n### 2.6 Claude Code Hooks `[0:40:00]`\n\n**操作步驟：**\n\n1. Hooks = 在特定事件觸發時自動執行的 Shell 指令\n2. 設定位置：`settings.json` 的 hooks 欄位\n3. 觸發時機：工具呼叫前/後、用戶提交前等\n4. 用途：自動化流程、安全檢查、自動格式化\n\n### 2.7 建立 Discord Bot `[0:50:00]`\n\n**操作步驟：**\n\n1. 前往 `discord.com/developers/applications`\n2. 點擊 New Application → 取名（如 \"Claude Bot\"）\n3. 進入 Bot 設定 → 開啟 Message Content Intent\n4. 點擊 Reset Token → 設置驗證密碼 → 複製新 Token\n5. 進入 OAuth2 → 勾選 Bot → 設定 Permissions：\n   - View Channels、Send Messages、Send Messages in Threads\n   - Attach Files、Read Message History、Add Reactions\n6. 複製生成的 URL → 在瀏覽器打開 → 邀請 Bot 到伺服器\n7. 在 Claude Code 中用 Token 連接 Bot\n\n---\n\n## 第 3 章：Vibe Coding 與 AI 前端設計開發 `[1:09:04 - 2:13:05]`\n\n### 3.1 Discord Bot 進階開發 `[1:09:04]`\n\n**操作步驟：**\n\n1. 設定 Bot Token 和 Discord Channel\n2. 使用 Claude Code 撰寫 Bot 邏輯\n3. 連接 Claude API 作為 Bot 的 AI 後端\n4. 實現功能：自動回覆、頻道訊息監控、指令處理\n\n### 3.2 Telegram Bot 開發 `[1:20:00]`\n\n**操作步驟：**\n\n1. 在 Telegram 搜尋 @BotFather\n2. 輸入 `/newbot` → 設定名稱 → 取得 Token\n3. 使用 Claude Code 建立 Bot 程式\n4. 連接 Telegram Bot API\n5. 部署到伺服器（VPS 或雲端）\n\n### 3.3 AI 前端設計開發 `[1:35:00]`\n\n**操作步驟：用 Claude Code 建立前端應用**\n\n1. 準備設計參考（截圖或描述）\n2. 在 Claude Code 中描述 UI 需求\n3. Claude 自動生成 React/Next.js 前端代碼\n4. 使用 `npm run dev` 啟動開發伺服器\n5. 在瀏覽器中查看效果 → 反覆調整\n6. 技巧：可用截圖讓 Claude 直接參考 UI 設計\n\n### 3.4 多頁面應用開發 `[1:50:00]`\n\n**操作步驟：**\n\n1. 先用 Claude Code 建立主頁面框架\n2. 逐步新增子頁面和路由\n3. 使用 Planning Agent 先規劃架構\n4. 注意：留意不同模型之間的設計風格一致性\n5. 使用 `CLAUDE.md` 統一程式碼規範\n\n---\n\n## 第 4 章：RAG 知識庫與多模態數據分析 `[2:13:05 - 3:49:00]`\n\n### 4.1 RAG 系統架構概述 `[2:13:05]`\n\nRAG（Retrieval-Augmented Generation）= 把資料放入知識庫 → 大模型從知識庫抓取資料 → 返回結果\n\n**8 大核心模組：**\n\n1. 建立前端 App 外殼\n2. 整合 Supabase Vector Database\n3. 開啟記錄管理器（防止資料重複）\n4. 提取內容與內容優化\n5. 解析多種文件格式\n6. 關鍵字搜索\n7. 連接大模型\n8. 文件分析與結果返回\n\n### 4.2 建立 RAG 系統 — 前端 `[2:14:30]`\n\n**操作步驟：**\n\n1. 從 GitHub 下載模板 repo\n2. 在 VS Code 中打開專案\n3. 工具選擇：VS Code + Claude Code（也可用 Cursor / Windsurf）\n4. 用 Claude Code 建立前端 UI（上傳區、搜索區、結果展示區）\n\n### 4.3 建立 RAG 系統 — Supabase 設定 `[2:20:00]`\n\n**操作步驟：**\n\n1. 前往 supabase.com 註冊/登入\n2. 建立新 Project\n3. 進入 Database → 啟用 pgvector 擴充\n4. 建立 documents 表格（含 embedding 向量欄位）\n5. 取得 Supabase URL 和 API Key\n6. 在專案 `.env` 檔案中設定連接資訊\n\n### 4.4 文件解析與 Embedding `[2:35:00]`\n\n**操作步驟：**\n\n1. 支援多種格式：PDF、Word、TXT、CSV、圖片等\n2. 使用 Chunking（分塊）策略切割大文件\n3. 透過 OpenAI / Claude Embedding API 將文字轉為向量\n4. 儲存向量到 Supabase Vector Database\n5. 重複資料偵測：透過記錄管理器更新而非重複新增\n\n### 4.5 多模態數據分析 `[3:00:00]`\n\n**操作步驟：**\n\n1. 上傳圖片/PDF/表格等多種格式\n2. Claude 自動識別文件類型並解析\n3. 對圖片進行 OCR + 內容理解\n4. 對表格進行數據分析\n5. 結合 RAG 知識庫進行交叉查詢\n\n### 4.6 RAG 搜索與問答 `[3:20:00]`\n\n**操作步驟：**\n\n1. 用戶輸入問題\n2. 系統將問題轉為向量\n3. 在 Supabase 中進行向量相似度搜索\n4. 取得最相關的文檔片段\n5. 將片段作為 context 送入大模型\n6. 大模型根據 context 生成回答\n\n---\n\n## 第 5 章：讓 AI 轉變為能處理複雜任務的自動化助手 `[3:49:00 - 5:01:38]`\n\n### 5.1 Vibe Coding 建立 AI Agent `[3:49:00]`\n\n無需任何編程背景，使用 Vibe Coding 製作 AI 工作流/AI 員工/AI 助手。\n\n**兩種方式：**\n\n- 方式 A：使用 Claude Web App 直接建立\n- 方式 B：在 Cursor / VS Code 中用 Claude Code 建立\n\n### 5.2 Claude Web App 建立自動化 `[3:49:20]`\n\n**操作步驟：**\n\n1. 打開 Claude Web App（claude.ai）\n2. 描述你要建立的自動化任務\n3. Claude 自動生成可執行的程式碼\n4. 在本地環境中運行和測試\n\n### 5.3 n8n 自動化工作流 `[4:00:00]`\n\n**操作步驟：**\n\n1. 安裝 n8n（自架或使用雲端版）\n2. 建立新的 Workflow\n3. 添加觸發節點（Trigger）：如 Webhook、定時、郵件觸發\n4. 添加處理節點：HTTP Request、AI 節點、條件判斷\n5. 連接 Claude API 作為 AI 處理核心\n6. 設定輸出：發送郵件、寫入資料庫、推送通知\n\n### 5.4 Multi-Agent 系統 `[4:20:00]`\n\n**操作步驟：**\n\n1. 規劃 Agent 角色分工（如：研究員、寫手、審核員）\n2. 使用 Claude Code 的 Agent 功能建立多個子 Agent\n3. 設定 Agent 之間的通訊和任務傳遞\n4. 使用 Planning Agent 統籌工作流程\n5. 測試和優化 Agent 協作\n\n### 5.5 自動化工具安裝與維護 `[4:40:00]`\n\n**操作步驟：**\n\n1. VPS 伺服器設定（用於部署 Bot 和自動化）\n2. 安裝 Docker 容器化部署\n3. 設定環境變數和 API Key\n4. 設定自動重啟和監控\n5. 日誌管理和錯誤處理\n\n---\n\n## 第 6 章：自動化生成機構級別的研究報告與市場監控 `[5:01:38 - 5:39:59]`\n\n### 6.1 華爾街分析師 AI `[5:01:38]`\n\n使用 Vibe Coding + Claude Code + VS Code 建立全自動股票分析系統。\n\n**成果展示：**\n\n- 輸入一句 \"Should I invest in Tesla\"\n- AI 自動生成全方位分析報告\n- 包含：公司基本面、技術分析、市場趨勢、風險評估、投資建議\n\n### 6.2 建立股票分析系統 `[5:05:00]`\n\n**操作步驟：**\n\n1. 在 VS Code 中用 Claude Code 建立專案\n2. 連接金融數據 API（如 Yahoo Finance、Alpha Vantage）\n3. 設定數據抓取和解析模組\n4. 建立分析 Prompt 模板（含技術面、基本面、市場情緒）\n5. 用 Claude API 生成分析報告\n6. 輸出為格式化的 Markdown/PDF 報告\n\n### 6.3 市場監控自動化 `[5:20:00]`\n\n**操作步驟：**\n\n1. 設定定時抓取任務（如每日/每小時）\n2. 監控目標：股價變動、新聞、財報發布\n3. 觸發條件：價格異常波動、重大新聞等\n4. 自動生成警報和分析報告\n5. 推送到 Discord / Telegram / Email\n\n### 6.4 網頁爬取與數據收集 `[5:30:00]`\n\n**操作步驟：**\n\n1. 使用 Firecrawl MCP 爬取目標網站\n2. 使用 Playwright MCP 處理需要登入的網站\n3. 抓取數據 → 餵入 AI 進行分析\n4. 結合 RAG 知識庫存儲歷史數據\n\n---\n\n## 第 7 章：如何保護個人數據安全 `[5:39:59 - 5:47:34]`\n\n### 7.1 公網暴露風險 `[5:39:59]`\n\n**警告：** 全球有 4000+ 個服務器在公網上暴露了 Ollama 等 AI 工具的控制界面。\n\n### 7.2 安全防護操作步驟\n\n1. **不要將 AI 工具暴露在公網上**\n   - Ollama、n8n 等工具的管理界面不應對外開放\n   - 使用防火牆限制訪問 IP\n\n2. **設定認證和密碼**\n   - 為所有管理界面設定強密碼\n   - 啟用兩步驗證（2FA）\n\n3. **使用 VPN 或 SSH Tunnel**\n   - 透過 VPN 連接遠端伺服器\n   - 使用 SSH Tunnel 安全訪問本地端口\n\n4. **API Key 安全**\n   - 不要將 API Key 放在公開的代碼中\n   - 使用 `.env` 檔案管理敏感資訊\n   - `.env` 加入 `.gitignore` 避免上傳到 GitHub\n\n5. **定期檢查**\n   - 檢查伺服器開放的端口\n   - 使用 Shodan 等工具掃描自己的公網 IP\n   - 及時關閉不需要的服務\n\n---\n\n## 第 8 章：結尾 `[5:47:34 - 5:49:53]`\n\n- 看完課程是第一步，一定要動手實操\n- 下載模板自己試做 AI 自動化工作流\n- 98% 的人只看不做，要成為那 2% 成功的人\n- VIP 社群有 60+ 小時進階課程\n- 每周兩次直播分享\n\n---\n\n## 工具與資源清單\n\n| 工具 | 用途 | 類型 |\n|------|------|------|\n| Claude Desktop | AI 對話 + Plugins | 桌面應用 |\n| Claude Code | 終端 AI 編程助手 | CLI 工具 |\n| VS Code / Cursor | 程式碼編輯器 | IDE |\n| Supabase | 向量資料庫（RAG） | 雲端服務 |\n| n8n | 自動化工作流 | 自架/雲端 |\n| Discord Bot API | Discord 機器人 | API |\n| Telegram Bot API | Telegram 機器人 | API |\n| Firecrawl | 網頁爬取 | MCP Server |\n| Playwright | 瀏覽器自動化 | MCP Server |\n| Ollama | 本地大模型運行 | 本地工具 |"}, {"title": "Obsidian同步github", "date": "2026/04/11", "ym": "202604", "preview": "https://youtu.be/IlNOhNeWGgY?si=ACMzSw2WjD89lrKO", "md": "https://youtu.be/IlNOhNeWGgY?si=ACMzSw2WjD89lrKO \n\nhttps://youtu.be/7f2q6tWbYQc?si=b__73jhcro_SLP9w\n\nhttps://youtu.be/RSEIUZHlhk4?si=pUJCneXH1WqhnvNO\n\n(待處理) （to do)"}, {"title": "DBS CEO談AI策略", "date": "2026/04/11", "ym": "202604", "preview": "tags: #AI #Banking #DBS #Fintech #GenAI", "md": "tags: #AI #Banking #DBS #Fintech #GenAI\nsource: https://youtu.be/9b6b-0NkJM0\nauthor: DBS Kopi Time E175 — CEO Tan Su Shan（陳淑珊）\n\n## 影片資訊\n- **頻道**：DBS（Kopi Time 系列）\n- **標題**：Kopi Time E175: DBS CEO Tan Su Shan on wars, tariffs, AI and fintech\n- **連結**：https://youtu.be/9b6b-0NkJM0\n- **來賓**：Tan Su Shan（陳淑珊）— DBS 集團 CEO，東南亞最大銀行首位女性掌門人\n\n## 核心觀念\n\n> **AI 不是未來願景，是現在進行式** — \"It's not hope. It's now. It's already happening. And it will get even better.\"\n> DBS 以十年數據基礎設施投資為底，將 AI 從實驗轉為年營收 SG$10 億的實戰武器。\n\n---\n\n## 一、AI 營收實績：用數字說話\n\n| 年度 | AI 經濟價值 | 說明 |\n|------|------------|------|\n| 2024 | **SG$7.5 億** | 已實現營收，非預估 |\n| 2025 | **SG$10 億+**（≈ US$7.68 億） | 年增 33%，持續成長 |\n\n### 同業對比\n\n| 銀行 | AI 投資/營收狀態 |\n|------|-----------------|\n| **DBS** | AI 年營收 SG$10 億+，已獲利 |\n| **JPMorgan** | 年投資 US$20 億，剛損益兩平 |\n\n---\n\n## 二、AI 部署規模\n\n| 指標 | 數字 |\n|------|------|\n| AI 使用案例 | **370+** |\n| 部署模型數 | **1,500+** |\n| 個人化演算法 | **100+** |\n| 年度 AI 推播（nudges） | **10 億+** 則 |\n\n---\n\n## 三、具體 AI 應用場景\n\n| 應用 | 說明 |\n|------|------|\n| **DBS Joy** | AI 企業客戶助理，7×24 回答企業銀行查詢 |\n| **個人化推播（Nudges）** | 分析消費模式變化（如餐飲支出增加），主動建議儲蓄調整 |\n| **詐欺偵測** | AI 即時辨識異常交易 |\n| **信用評分** | 演算法驅動的信貸決策 |\n| **Agentic AI** | 自主型 AI 以最少人為監督執行金融決策 |\n\n---\n\n## 四、員工轉型策略：升級而非裁員\n\n> 員工透過 AI 成為「**超人銀行家**」（superhuman bankers）— 不是淘汰人力，是升級人力。\n\n- 推出 **GenAI 教練工具**，協助員工從重複性工作轉向客戶關係經營\n- 被 digibot 取代的服務人員 → 轉型為**關係經理（RM）**，服務未被指派的客戶\n- 重新定位為職涯「升級」而非裁員\n\n---\n\n## 五、AI 發展歷程：十年磨一劍\n\n| 年份 | 里程碑 |\n|------|--------|\n| 2014 | 陳淑珊率先嘗試 IBM Watson 用於財富管理（失敗，但團隊留任至今） |\n| 2014–2024 | 十年持續現代化數據系統，打破業務線資料孤島 |\n| 2024–2025 | AI 全面商業化，年營收破 SG$10 億 |\n\n### 關鍵策略：One-Bank Initiative\n- 消除消費、企業、市場部門的**資料孤島**\n- 整合全行數據，讓 AI 能跨業務線學習與推薦\n- 任命 Derrick Goh 為 COO，統一營運、科技與治理\n\n---\n\n## 六、加密貨幣與區塊鏈佈局\n\n| 專案 | 年份 | 說明 |\n|------|------|------|\n| **DDEx** | 2020 | 全方位數位資產交易所（代幣化、交易、託管） |\n| **Partior** | 2022 | 與 JPMorgan、淡馬錫合建區塊鏈銀行間清算平台 |\n| **DBS Token Services** | 2024 | 代幣化與智慧合約銀行服務 |\n\n- 看好美國 **GENIUS Act**（穩定幣法案）推動全球監管加速\n- 新加坡、香港加速制定數位資產監管框架\n\n---\n\n## 七、地緣政治與金融科技\n\n> 「繫好安全帶」（\"You better buckle up\"）— 2025 年將是動盪之年。\n\n- 「**美元武器化**」驅動企業與高淨值家族尋求替代支付基礎設施\n- 地緣政治不確定性 + 利率下行 + 科技顛覆 = 三重逆風\n- 銀行需要組織韌性（organizational resilience）來應對\n\n---\n\n## 個人筆記\n\nDBS 的 AI 策略三大特點，值得臺灣金融業參考：\n1. **十年長期投資** — 2014 年就開始試錯，失敗不放棄，團隊留任繼續疊代\n2. **員工轉型優先** — 不裁員而是升級，用 GenAI 工具讓員工從操作型轉為關係型\n3. **數據先行** — One-Bank 打破資料孤島，AI 才有足夠養分發揮效果\n\n---\n\n## 參考資源\n- [Fortune: DBS's Tan Su Shan prepares for AI, crypto, and geopolitical change](https://fortune.com/article/dbs-group-ceo-tan-su-shan-singapore-southeast-asia-artificial-intelligence-crypto/)\n- [TechBuzz: DBS Bank CEO AI Already Driving $768M Revenue](https://www.techbuzz.ai/articles/dbs-bank-ceo-ai-already-driving-768m-revenue-not-bubble-hype)\n- [CNBC: DBS says AI adoption already paying off](https://www.cnbc.com/2025/11/14/ceo-southeast-asias-top-bank-dbs-says-ai-adoption-already-paying-off.html)\n- [Fintech Singapore: DBS AI Revenue to Grow Over S$1 Billion](https://fintechnews.sg/122167/singapore-fintech-festival-2025/dbs-ai-revenue/)\n\n---\n> 由 Claude Code 根據多篇媒體報導整理｜2026-04-11\n> 此影片未提供字幕，內容綜合 Fortune、CNBC、TechBuzz 等對陳淑珊 AI 觀點的報導"}, {"title": "Claude與TradingView MCP", "date": "2026/04/11", "ym": "202604", "preview": "tags: #AI #MCP #TradingView #Claude", "md": "tags: #AI #MCP #TradingView #Claude\nsource: https://youtu.be/vIX6ztULs4U\nauthor: Lewis Jackson (@LewisWJackson)\n\n學習心得：需要付費trading view 所以沒有練習\n## 影片目標\n\n將 **Claude Code** 透過 **MCP (Model Context Protocol)** 連接到 **TradingView Desktop**，讓 AI 能自動讀取圖表指標、掃描觀察清單、並產出交易分析報告。\n\n## 操作步驟\n\n### Step 1：Clone 專案並安裝依賴\n\n```bash\ngit clone https://github.com/LewisWJackson/tradingview-mcp-jackson.git ~/tradingview-mcp-jackson\ncd ~/tradingview-mcp-jackson\nnpm install\n```\n\n### Step 2：設定交易規則\n\n```bash\ncp ~/tradingview-mcp-jackson/rules.example.json ~/tradingview-mcp-jackson/rules.json\n```\n\n編輯 `rules.json`，填入：\n- **觀察清單 (watchlist symbols)**：想監控的交易標的\n- **偏向判斷標準 (bias criteria)**：多空判斷條件\n- **風險管理規則 (risk management rules)**\n\n### Step 3：設定 MCP 連線\n\n在 `~/.claude/.mcp.json` 中加入：\n\n```json\n{\n  \"mcpServers\": {\n    \"tradingview\": {\n      \"command\": \"node\",\n      \"args\": [\"/Users/你的使用者名稱/tradingview-mcp-jackson/src/server.js\"]\n    }\n  }\n}\n```\n\n### Step 4：以 Debug 模式啟動 TradingView Desktop\n\n| 平台 | 指令 |\n|------|------|\n| **Mac** | `/Applications/TradingView.app/Contents/MacOS/TradingView --remote-debugging-port=9222` |\n| **Windows** | `%LOCALAPPDATA%\\TradingView\\TradingView.exe --remote-debugging-port=9222` |\n| **Linux** | `/opt/TradingView/tradingview --remote-debugging-port=9222` |\n\n關鍵參數：`--remote-debugging-port=9222`，讓 Claude 透過 Chrome DevTools Protocol 與 TradingView 溝通。\n\n### Step 5：重啟 Claude Code\n\n關閉再重新開啟 Claude Code，讓它載入新的 MCP 設定。\n\n### Step 6：驗證連線\n\n在 Claude Code 中執行 `tv_health_check`，確認連線成功。\n\n### Step 7：執行 Morning Brief（晨間分析報告）\n\n對 Claude 說 **\"Run morning_brief\"**，它會：\n1. 自動掃描觀察清單上的每個標的\n2. 讀取所有技術指標（RSI、MACD、布林通道、EMA 等）\n3. 對照 `rules.json` 定義的交易規則\n4. 產出結構化的交易分析摘要\n\n## 核心功能一覽\n\n- **圖表分析**：讀取指標值、價格資料、自訂繪圖\n- **圖表控制**：切換標的/時間框架、新增/移除指標\n- **Pine Script 開發**：注入程式碼、編譯、偵錯\n- **回測模式**：Replay mode 含損益追蹤\n- **共 81 個 MCP 工具**，全部本地處理，不外傳資料\n\n## 注意事項\n\n- 需要 **TradingView Desktop 付費版**\n- 需要 **Node.js 18+**\n- 此工具使用 TradingView 未公開的 API，使用者需自行承擔帳號風險\n\n## 參考資源\n\n- [GitHub Repo](https://github.com/LewisWJackson/tradingview-mcp-jackson)\n- [Setup Guide](https://github.com/LewisWJackson/tradingview-mcp-jackson/blob/main/SETUP_GUIDE.md)\n- [Lazy Tech Talk 教學](https://www.lazytechtalk.com/guides/connect-claude-code-to-tradingview-with-mcp-a-developers-guide)"}, {"title": "合法節稅布局思維", "date": "2026/04/10", "ym": "202604", "preview": "[年薪1000萬繳的稅，竟然比100萬的還少？會計師揭密合法節稅的關鍵思維！](https://yo", "md": "[年薪1000萬繳的稅，竟然比100萬的還少？會計師揭密合法節稅的關鍵思維！](https://youtu.be/cACQDJZw4Vs?si=ZFMYAs4SRMWgmCHI)\n\n## 影片資訊\n- **頻道**：查理的創業化合物\n- **來賓**：胡碩勻（Brent）— 信達聯合會計師事務所所長、《節稅的布局》作者\n- **連結**：https://youtu.be/cACQDJZw4Vs\n- **時長**：約 89 分鐘\n\n## 核心觀念\n\n> **稅後財富最大化** — 不是「獲利最大化」，而是要加上「稅後」兩個字。最好的節稅方法就是**提前規劃布局**，而非事後補救。\n\n---\n\n## 一、台灣稅制全景（00:00 - 21:00）\n\n### 人生各階段的稅\n| 階段       | 稅種                | 最高稅率        |\n| -------- | ----------------- | ----------- |\n| 賺錢（個人所得） | 綜合所得稅             | 5%～40%      |\n| 買房       | 土地增值稅、房屋稅、地價稅、囤房稅 | —           |\n| 賣房       | 房地合一稅             | 最高 45%（2年內） |\n| 開公司      | 營業稅 5%、營所稅 20%    | —           |\n| 發股利      | 股利所得稅             | 最高 28%      |\n| 未分配盈餘    | 未分配盈餘稅            | 5%          |\n| 傳承       | 遺產稅 / 贈與稅         | 最高 20%      |\n\n### Death and Tax\n- 從搖籃到墳墓，一生都離不開稅\n- 若每代都不規劃遺產稅（20%），10 億 → 第二代 8 億 → 第三代 6.4 億，財富快速縮水\n\n---\n\n## 二、公司盈餘分配節稅（21:00 - 36:00）\n\n### 組織形態影響稅負\n- **獨資合夥（行號）**：盈餘直接併入個人綜所稅（最高 40%），適合年賺 200 萬以下\n- **有限公司 / 股份有限公司**：盈餘分配為股利所得\n\n### 股利所得兩種計稅方式\n1. **合併計稅**：併入綜所稅（最高 40%），可抵扣 8.5%，上限 8 萬元\n2. **分開計稅**：單一稅率，最高 28%\n\n### 關鍵數字：股利 100 萬是神秘數字\n- 8 萬 ÷ 8.5% ≈ 94 萬 → 約 100 萬以內的股利，合併計稅可能**不用繳稅甚至退稅**\n- 例：股利 100 萬 → 可抵 8 萬，扣除免稅額扣除額後淨額約 50 萬 → 稅率 5% = 25,000 → 抵 8 萬 → **退稅 5.5 萬**\n\n### 最佳分配策略\n- 有限公司賺 200 萬 → 分 100 萬股利（可能免稅），留 100 萬繳 5% 未分配盈餘稅\n- 不要全部不分，也不要全部分\n\n### 投資公司（Holding Company）節稅\n- **所得稅法第 42 條**：國內公司轉投資其他國內公司，轉投資收益**免稅**\n- 例：個人買台積電領 1,000 萬股利 → 繳 280 萬（28%）；投資公司買同樣張數 → **完全不課稅**\n- 重要提醒：\n  - 一開始創業就要規劃兩家公司（營運公司 + 投資公司）\n  - 不要中途才搬移，國稅局會注意「繳稅溫度」的異常變化\n  - 若能自己控制盈餘分配（無外部股東），可不必多架一層\n\n### 遞延稅賦效果\n- 開公司可延後一年繳稅，保留資金做投資，產生額外收益\n\n---\n\n## 三、個人綜所稅拆解 — 為何 1000 萬繳的稅比 100 萬少（36:00 - 49:00）\n\n### 方法一：擴大扣除額\n\n#### 免稅額\n- 單人：約 9.7 萬\n- 配偶：再加一倍\n- 每個小孩：再加一個單位\n- 70 歲以上長輩：一個當兩個（約 14～15 萬）\n- 扶養越多人，免稅額越高（配偶父母、自己父母、兄弟姐妹的小孩都可掛）\n\n#### 列舉扣除額（適合高收入）\n| 項目 | 說明 |\n|------|------|\n| 保險費 | 人身保險費可列舉 |\n| 捐贈 | 所得的 20% 上限（捐給基金會）；扶輪社 AKS 等可大額捐贈 |\n| 醫藥生育費 | 實支實付 |\n| 購屋借款利息 | 一年最高 30 萬扣除額（即使有錢也故意貸款） |\n| 災害損失 | **無上限**！颱風/地震/停電損壞皆可申請（建議平時拍照存證 Before/After） |\n| 長照扣除額 | 每人十幾萬 |\n| 幼兒學前特別扣除額 | 6 歲以下：第 1 個 15 萬，第 2 個起 22.5 萬 |\n| 大學學費 | 每人 2.5 萬 |\n\n#### 基金會節稅\n- 成立基金會，捐款可抵個人所得稅\n- 基金會需消化收入的 6 成預算才能免稅\n- 可聘家族成員為執行長/顧問、辦活動、租辦公室、買車等\n- 董監事家族成員不得超過 1/3 席次\n\n### 方法二：從源頭改變所得類別\n\n| 所得類別 | 必要費用率 | 說明 |\n|----------|-----------|------|\n| 薪資（50 類） | 薪特扣約 22～23 萬 | 最不利，跑不掉 |\n| 執行業務所得（會計師/律師/醫師） | 30%～35% | 100 萬只需以 65 萬計稅 |\n| 節目製作人/藝人 | 45% | 100 萬只需以 55 萬計稅 |\n| 包租公/包租婆（租金收入） | 43% | 100 萬只需以 57 萬計稅 |\n| 海外所得 | 80%（找不到成本時） | 100 萬以內完全免稅 |\n| 股利所得 | 可抵扣 8.5%（上限 8 萬） | 100 萬以內幾乎免稅 |\n\n### 名模條款（薪資特定費用減除）\n- 源自林志玲案件，大法官裁定所有薪資族可用\n- 三項費用可額外扣除（各上限為薪資的 3%，合計 9%）：\n  1. **治裝費**\n  2. **職業工具**（麥克風、設備等生財器具）\n  3. **教育進修訓練費**\n- 薪水 200～300 萬以上的人才值得收集發票\n- 從 1 月 1 日就要開始收集憑證！\n\n---\n\n## 四、海外所得的節稅空間（49:00 - 62:00）\n\n### 基本規則\n- 海外所得 100 萬以內 → **完全免稅**（不併入綜所稅）\n- 超過 100 萬 → 併入最低稅負制（基本稅額條例），稅率 20%\n- 免稅額 750 萬，但**含境內所得**一起計算\n\n### 高收入者的超級紅利\n- 境內所得 1,000 萬 + 海外所得 1,000 萬 = 2,000 萬\n- 2,000 萬 − 750 萬免稅額 = 1,250 萬 × 20% = 250 萬（政府要求的低消）\n- 但境內 1,000 萬已繳 300～400 萬稅 → 超過低消 → **海外 1,000 萬一毛不繳**\n\n### 海外所得成本認定\n- 若找不到原始成本憑證，可用**成交價的 20%** 作為所得（80% 當必要費用）\n- 例：海外基金賣出 500 萬 → 所得僅 100 萬 → 免稅門檻內 → 不用繳稅\n\n### 基金的國內/海外判定\n- 看**基金註冊地**，不是看投資標的\n- 國內投信發行（富邦/國泰）→ 即使投海外標的，配息為海外所得，但價差為國內證交所得（停徵）\n- 海外註冊基金 → 不管投什麼，全部算海外所得\n\n### 虛擬貨幣課稅\n- 政府視為**存貨**（非金融商品）→ 財產交易所得，最高 40%\n- 境內平台：幣幣交易不課稅，換成法幣時課稅\n- 境外平台：算海外所得（適用 100 萬免稅 + 750 萬基本稅額）\n\n---\n\n## 五、節稅時間軸布局（62:00 - 65:00）\n\n| 時間 | 行動 |\n|------|------|\n| 1 月 | 扣繳申報期，與老闆討論薪資結構與所得類別 |\n| 1～12 月 | 全年收集憑證（治裝/工具/進修發票） |\n| 5 月 | 報稅（前一年度所得） |\n| 6～8 月 | 檢討稅單，規劃明年度節稅策略 |\n| 年底前 | 決定捐贈時間點（今年捐 or 明年捐，看哪年稅率高） |\n\n---\n\n## 六、遺產與贈與稅規劃（65:00 - 85:00）\n\n### 遺產稅率\n| 級距 | 稅率 |\n|------|------|\n| 5,621 萬以下 | 10% |\n| 超過 ~ 2倍 | 15% |\n| 再超過 | 20% |\n\n### 贈與稅免稅額\n- 每人每年 **244 萬**免稅\n- 夫妻贈與**免稅**（無上限）\n- 配偶各自有 244 萬額度 → 合計 **488 萬/年**\n- 跨年度技巧：12 月底贈與一次 + 隔年 1 月初再贈一次 → 30 天內申報一次 → 雙倍額度（488 萬 → 976 萬）\n- 10 年累計可轉移 2,500 萬～1 億\n\n### 資產傳承六大原則\n1. **依照你的意思** — 財產分配、企業掌控、身後管理\n2. **晚年幸福** — 久病床前無孝子，不要考驗人性\n3. **產權完整** — 避免共有、分散（都更釘子戶教訓）\n4. **公平分配** — 減少後代紛爭\n5. **富過三代** — 長期規劃\n6. **節省稅務成本** — 稅後財富最大化\n\n### 閉鎖性公司設計\n- 股東 50 人以內\n- 股權轉讓須經**創辦人書面同意**（寫入章程，政府幫你把關）\n- 即使贈與子女股權，子女也「看得到吃不到」\n\n### 特別股（Preferred Shares）設計\n- **複數表決權**：1 股可設計 10 倍、100 倍投票權\n  - 父母持 10% 股權但有 100% 決策權\n  - 子女拿普通股，有分潤權但無決策權\n- **無表決權特別股**：只有分配股利的權利，沒有投票權\n  - 適合不參與經營的家族成員\n\n### 節稅工具\n| 工具    | 說明                               |\n| ----- | -------------------------------- |\n| 不動產   | 以公告現值課稅（約市價 1/2～1/5），壓縮效果顯著      |\n| 農地    | 農業使用可**完全免稅**（需取得農業使用證明書）        |\n| 人壽保險  | 指定受益人的保險金原則上免課遺產稅（保險帳戶免稅，投資帳戶課稅） |\n| 基金會   | 捐入財產可免贈與稅、免遺產稅                   |\n| 信託    | 財產管理與傳承的進階工具                     |\n| 家族辦公室 | 高資產族群的整合規劃                       |\n\n### 保險受益人提醒\n- **不要寫「法定繼承人」**，要寫具體的某某某\n- 單身/頂客族尤其重要：無配偶無子女 → 遺產歸兄弟姐妹\n- 特留份制度：法律保障各繼承人的最低份額（配偶/子女為應繼份 1/2，兄弟姐妹為 1/3）\n\n---\n\n## 七、Brent 的財務建議\n\n> 1. **儘早投資**（金錢 + 知識），讓複利發揮效果\n> 2. **節稅要從年輕就布局**，不要等到繳很多稅才來找會計師\n> 3. **財富多了要做公益**，施比受有福，付出會得到更多回報\n\n---\n\n## 推薦資源\n- 《節稅的布局》2026～2027 年版（胡碩勻著）— 每年再版更新免稅額、扣除額及最新案例"}, {"title": "Obsidian入門", "date": "2026/04/10", "ym": "202604", "preview": "Obsidian", "md": "Obsidian \nhttps://youtu.be/NAdWvM5RPJE?si=CQpMWVBrv3SZ6_Ka"}, {"title": "ClaudeCode與GoogleWorkspaceCLI", "date": "2026/04/10", "ym": "202604", "preview": "[Claude Code × Google 新工具：工作效率直接提升 10 倍](https://y", "md": "[Claude Code × Google 新工具：工作效率直接提升 10 倍](https://youtu.be/G4JFkYx0q3s?si=6cHGCN7SqiPPkPJu) \n測試成功\n\nOAuth\nClient ID:\n[658170706346-v48ifhfnpp8o96inrupg18b0al9f01b7.apps.googleusercontent.com](http://658170706346-v48ifhfnpp8o96inrupg18b0al9f01b7.apps.googleusercontent.com/)\nClient Secret:\n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\n\n# Claude Code × Google Workspace CLI 學習筆記\n\n## 影片資訊\n- **頻道**：JayLux.AI\n- **標題**：Claude Code × Google 新工具：工作效率直接提升 10 倍\n- **連結**：https://youtu.be/G4JFkYx0q3s\n- **時長**：約 16 分鐘\n\n## 核心主題\n\nGoogle 官方開源了 Google Workspace CLI（gws），讓 Claude Code 能用一行 bash 指令直接控制整個 Google Workspace，不需要設 MCP，也不需要寫 API。\n\n## 重點摘要\n\n### 一、Google Workspace CLI 是什麼？（0:00 - 2:29）\n- Google 官方開源的命令列工具，名為 `gws`\n- 讓 AI Agent（如 Claude Code）直接操作 Google Workspace 全系列服務\n- 與 MCP 的差異：gws 透過 bash 指令操作，不需額外設定 MCP server\n- 支援 Drive、Gmail、Calendar 等所有 Workspace API\n- 零樣板程式碼，結構化 JSON 輸出\n- 內建 40+ agent skills\n\n### 二、安裝與設定（2:29 - 9:50）\n**步驟：**\n1. 安裝 gws CLI：`npm install -g @googleworkspace/cli`\n2. 設定 Google Cloud 專案：`gws auth setup`\n3. OAuth 登入：`gws auth login`\n\n**前提條件：**\n- Node.js 18+\n- Google Cloud 專案（需設定 OAuth 同意畫面 + OAuth 憑證）\n- Google 帳號\n\n### 三、Workflow 1：YouTube 影片 → Google Doc 學習筆記（9:50 - 11:48）\n**流程：**\n1. 輸入 let q = "";
function esc(s){return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function ymLabel(ym){return ym?ym.slice(0,4)+" 年 "+ym.slice(4)+" 月":"";}

function render(){
  const k=q.toLowerCase();
  const f=NOTES.filter(n=>!k||n.title.toLowerCase().includes(k)||n.md.toLowerCase().includes(k));
  const list=document.getElementById("list");
  if(!f.length){list.innerHTML='<div class="empty">查無筆記</div>';return;}
  let html="", lastYm="";
  f.forEach((n,i)=>{
    if(n.ym!==lastYm){html+=`<div class="mhdr">${ymLabel(n.ym)}</div>`;lastYm=n.ym;}
    const chip=n.date?`<span class="dchip">${n.date.slice(5)}</span>`:"";
    html+=`<div class="note" onclick="openNote(${NOTES.indexOf(n)})">
      <div class="trow"><div class="t">${esc(n.title)}</div>${chip}</div>
      <div class="p">${esc(n.preview)}</div></div>`;
  });
  list.innerHTML=html;
}
function openNote(i){
  const n=NOTES[i];
  document.getElementById("rtitle").textContent=n.title;
  document.getElementById("rbody").innerHTML=marked.parse(n.md);
  document.getElementById("reader").classList.add("show");
  document.getElementById("reader").scrollTop=0;
  history.pushState({r:1},"");
}
function closeReader(){document.getElementById("reader").classList.remove("show");}

document.getElementById("search").oninput=e=>{q=e.target.value.trim();render();};

// 學習筆記 widget
const NK='earn_notes_v1';
function nLoad(){return JSON.parse(localStorage.getItem(NK)||'[]');}
function nSave(a){localStorage.setItem(NK,JSON.stringify(a));}
function nRender(){
  const a=nLoad();
  const el=document.getElementById('nitems');
  if(!a.length){el.innerHTML='<div class="nempty">還沒有筆記，輸入後點「新增筆記」開始記錄</div>';return;}
  el.innerHTML=a.slice().reverse().map((n,ri)=>
    `<div class="nitem"><span class="ntag">${n.c}</span><div style="flex:1"><div class="ntxt">${esc(n.t)}</div><div class="nts">${n.d}</div></div><button class="ndel" onclick="nDel(${a.length-1-ri})" aria-label="刪除"><svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button></div>`
  ).join('');
}
function noteAdd(){
  const t=document.getElementById('ntxt').value.trim();if(!t)return;
  const c=document.getElementById('ncat').value;
  const a=nLoad();
  const d=new Date().toLocaleString('zh-TW',{hour12:false,year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
  a.push({c,t,d});nSave(a);document.getElementById('ntxt').value='';nRender();
}
function nDel(i){const a=nLoad();a.splice(i,1);nSave(a);nRender();}
function noteClear(){if(!confirm('確定清空所有筆記？'))return;nSave([]);nRender();}
function noteExport(){
  const a=nLoad();if(!a.length){alert('沒有筆記可匯出');return;}
  const txt=a.map(n=>`[${n.d}][${n.c}] ${n.t}`).join('
');
  const u=URL.createObjectURL(new Blob([txt],{type:'text/plain'}));
  const l=document.createElement('a');l.href=u;l.download='Money筆記.txt';l.click();
}
function noteToggle(){
  document.getElementById('npanel').classList.toggle('open');
  const open=document.getElementById('npanel').classList.contains('open');
  document.getElementById('nfab').style.opacity=open?'0':'1';
  document.getElementById('nfab').style.pointerEvents=open?'none':'auto';
  if(open)nRender();
}
document.getElementById('ntxt').addEventListener('keydown',e=>{if(e.key==='Enter')noteAdd();});
